# Monitor profile defaults used by ~/.config/hypr/scripts/monitor-profile.sh.

INTERNAL_MONITOR="eDP-1"
LAPTOP_LOGICAL_WIDTH=1440
LAPTOP_LOGICAL_HEIGHT=900
LAPTOP_SCALE=2

# Work monitors are pinned by description/serial so changing DP connector names
# do not swap the screens after reboot or dock reconnect.
WORK_LEFT_DESC="ASUSTek COMPUTER INC VZ27EHF T3LMTJ005534"
WORK_RIGHT_DESC="ASUSTek COMPUTER INC VZ27EHF T3LMTJ005105"

# When a single external has not been learned yet, prefer the home layout.
UNKNOWN_SINGLE_EXTERNAL_PROFILE="home"
POLL_INTERVAL=2
