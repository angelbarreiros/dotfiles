# Application bindings
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" bash -c "tmux attach || tmux new -s Work"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, B, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, W, WhatsApp, exec, omarchy-launch-or-focus "^chrome-web.whatsapp.com__-Default$" "omarchy-launch-webapp \"https://web.whatsapp.com\""

# Custom overrides
unbind = SUPER SHIFT, N
bindd = SUPER SHIFT, N, Notification Center, exec, /home/demper/.config/waybar/scripts/notification-center-launch.sh
bindd = SUPER CTRL, M, Toggle notification silencing, exec, omarchy-toggle-notification-silencing
unbind = SUPER, B
bindd = SUPER, B, Web browser, exec, firefox
unbind = SUPER, L
bindd = SUPER, L, Lock session, exec, loginctl lock-session
unbind = SUPER, W
bindd = SUPER, W, Close window (webapps to scratchpad), exec, ~/.config/hypr/close-active-window.sh
bindd = SUPER, Delete, Force close window, exec, ~/.config/hypr/force-close-active-window.sh
bindd = SUPER SHIFT, S, Move window to scratchpad, movetoworkspacesilent, special:scratchpad

# Override workspace move bindings to move silently (without following)
unbind = SUPER SHIFT, code:10
unbind = SUPER SHIFT, code:11
unbind = SUPER SHIFT, code:12
unbind = SUPER SHIFT, code:13
unbind = SUPER SHIFT, code:14
unbind = SUPER SHIFT, code:15
unbind = SUPER SHIFT, code:16
unbind = SUPER SHIFT, code:17
unbind = SUPER SHIFT, code:18
unbind = SUPER SHIFT, code:19

bindd = SUPER SHIFT, code:10, Move window to workspace 1 (silent), movetoworkspacesilent, 1
bindd = SUPER SHIFT, code:11, Move window to workspace 2 (silent), movetoworkspacesilent, 2
bindd = SUPER SHIFT, code:12, Move window to workspace 3 (silent), movetoworkspacesilent, 3
bindd = SUPER SHIFT, code:13, Move window to workspace 4 (silent), movetoworkspacesilent, 4
bindd = SUPER SHIFT, code:14, Move window to workspace 5 (silent), movetoworkspacesilent, 5
bindd = SUPER SHIFT, code:15, Move window to workspace 6 (silent), movetoworkspacesilent, 6
bindd = SUPER SHIFT, code:16, Move window to workspace 7 (silent), movetoworkspacesilent, 7
bindd = SUPER SHIFT, code:17, Move window to workspace 8 (silent), movetoworkspacesilent, 8
bindd = SUPER SHIFT, code:18, Move window to workspace 9 (silent), movetoworkspacesilent, 9
bindd = SUPER SHIFT, code:19, Move window to workspace 10 (silent), movetoworkspacesilent, 10

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER, M, Gmail, exec, omarchy-launch-or-focus "^chrome-gmail.com__-Default$" "omarchy-launch-webapp \"https://gmail.com\""

# Add extra bindings
# bind = SUPER SHIFT, R, exec, alacritty -e ssh your-server

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu

