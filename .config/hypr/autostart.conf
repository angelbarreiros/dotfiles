# Extra autostart processes
# exec-once = uwsm-app -- my-service
exec-once = uwsm-app -- tuxedo-control-center --tray
# Ensure notifications are not left in do-not-disturb after login.
exec-once = sh -lc 'makoctl mode -r do-not-disturb >/dev/null 2>&1 || true'
exec-once = sh -lc '~/.config/hypr/mark-focused-notifications-read.sh >/dev/null 2>&1 &'
exec-once = sh -lc 'mkdir -p ~/.local/state/hypr-monitor-profiles && ~/.config/hypr/scripts/monitor-profile.sh daemon >>~/.local/state/hypr-monitor-profiles/daemon.log 2>&1 &'
exec-once = sh -lc 'bash ~/.config/hypr/startup-webapps-scratchpad.sh >/dev/null 2>&1 &'
